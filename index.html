<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永豐餘職缺探索 | Student Job</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { background-color: #f8fafc; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* 方塊基礎樣式 */
        .cat-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid #f1f5f9; 
            cursor: pointer; 
            min-height: 80px; 
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border-radius: 1.5rem;
            padding: 1rem;
            background-color: white;
            position: relative;
            font-size: 1rem;
            font-weight: 700;
        }
        
        .cat-card:active { transform: scale(0.95); }
        
        /* 螢光發亮效果 */
        .active-filter { 
            filter: brightness(1.1) saturate(1.3) !important;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.6), 0 0 10px rgba(99, 102, 241, 0.3) !important;
            border: 2px solid #6366f1 !important;
            transform: translateY(-3px) scale(1.03);
            z-index: 10;
        }

        .job-card { border-left: 6px solid #6366f1; transition: transform 0.2s; }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* --- 頂部 Header 樣式調整 --- */
        .gradient-bg { 
            background-image: url('arrow5.jpg'); 
            background-size: contain;    
            background-position: center; 
            background-repeat: no-repeat;
            background-color: #f8f0f4;   
            height: 220px; /* 固定高度 */
            display: flex;
            flex-direction: column;
            justify-content: flex-end; /* 讓內容靠底部排列 */
        }

        /* 設定自定義文字顏色 #ec227b */
        .header-custom-text {
            color: #ec227b;
        }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="pb-24">

    <!-- 頂部 Header -->
    <div class="gradient-bg header-custom-text px-8 pb-11 rounded-b-[50px] shadow-2xl text-center">
        <p class="opacity-90 text-sm font-bold animate-fadeIn">在永豐餘找到最適合你的職缺🌼</p>
    </div>

    <!-- 1. 職缺類別 (主篩選區) -->
    <section class="px-6 -mt-10">
        <div class="bg-white rounded-[32px] p-6 shadow-xl border border-gray-50">
            <h2 class="text-gray-800 font-bold mb-5 flex items-center text-lg">
                <i class="fa-solid fa-tags text-amber-500 mr-2 text-xl"></i> 請選擇感興趣的類別
            </h2>
            <div id="categoryGrid" class="grid grid-cols-2 gap-4">
                <!-- 由 JS 生成特定顏色的四個類別 -->
            </div>
            <button onclick="resetFilter()" class="w-full mt-6 text-xs text-indigo-500 font-bold py-4 bg-indigo-50 rounded-2xl active:bg-indigo-100 transition-all">
                顯示全部職缺
            </button>
        </div>
    </section>

    <!-- 2. 職缺清單 -->
    <section class="mt-8 px-6">
        <div class="flex justify-between items-center mb-5">
            <h2 id="listTitle" class="text-gray-900 font-bold text-xl">推薦職缺</h2>
            <span id="jobCount" class="bg-indigo-100 text-indigo-600 text-xs px-3 py-1.5 rounded-full font-extrabold">0</span>
        </div>
        <div id="jobList" class="space-y-5">
            <div class="text-center py-20 text-gray-400 text-sm">載入中...</div>
        </div>
    </section>

    <!-- 底部導覽 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-gray-100 px-12 py-5 flex justify-around items-center z-50 shadow-lg">
        <button id="nav-home" onclick="handleNavClick('home')" class="flex flex-col items-center text-indigo-600 transition-colors">
            <i class="fa-solid fa-compass text-2xl"></i>
            <span class="text-[10px] mt-1.5 font-bold">探索</span>
        </button>
        <button id="nav-explore" onclick="handleNavClick('explore')" class="flex flex-col items-center text-gray-400 transition-colors">
            <i class="fa-solid fa-list-ul text-2xl"></i>
            <span class="text-[10px] mt-1.5 font-bold">總覽</span>
        </button>
    </nav>

    <script>
        const SHEET_ID = '1_fe8wTuSfxUX8gMFTz19V5vPX99dj79s8vewQtWjlag';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        let allJobs = [];
        const targetCategories = ["循環經濟人才", "數位轉型人才", "能源工務人才", "運營管理人才"];

        // 定義每一種人才的顏色樣式
        const categoryStyles = {
            "循環經濟人才": { bg: "#b2ddd1", text: "#064e3b" }, // 背景色, 深綠色字
            "數位轉型人才": { bg: "#fedcae", text: "#451a03" }, // 背景色, 深咖色字
            "能源工務人才": { bg: "#bbe5f9", text: "#1e3a8a" }, // 背景色, 深藍色字
            "運營管理人才": { bg: "#f7c4df", text: "#4a044e" }  // 背景色, 深粉色字
        };

        function getValueByKeyword(fields, keyword) {
            const key = Object.keys(fields).find(k => k.includes(keyword));
            return key ? fields[key] : "";
        }

        async function fetchJobs() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                const jsonData = JSON.parse(text.substring(47, text.length - 2));
                const headers = jsonData.table.cols.map(c => c.label ? c.label.trim() : "");

                allJobs = jsonData.table.rows.map(row => {
                    let fields = {};
                    row.c.forEach((cell, i) => {
                        if (headers[i]) fields[headers[i]] = cell ? cell.v : "";
                    });
                    return { fields: fields };
                });
                
                renderCategoryGrid(targetCategories);
                renderJobs(allJobs);
            } catch (error) { 
                console.error("資料載入失敗", error); 
                document.getElementById('jobList').innerHTML = "資料讀取錯誤，請重新整理。";
            }
        }

        function renderCategoryGrid(categories) {
            document.getElementById('categoryGrid').innerHTML = categories.map(c => {
                const style = categoryStyles[c] || { bg: "#ffffff", text: "#000000" };
                return `
                <div data-cat="${c}" onclick="handleCatSelection('${c}', this)" 
                     class="cat-card shadow-sm" 
                     style="background-color: ${style.bg}; color: ${style.text};">
                    <span>${c}</span>
                </div>`;
            }).join('');
        }

        function renderJobs(jobs) {
            document.getElementById('jobCount').innerText = jobs.length;
            const container = document.getElementById('jobList');
            if (jobs.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-400 font-medium">目前此類別無職缺</div>`;
                return;
            }
            container.innerHTML = jobs.map(job => {
                const f = job.fields;
                const applyLink = getValueByKeyword(f, "投遞") || getValueByKeyword(f, "連結") || 'https://www.yfy.com/';
                return `
                    <div class="job-card bg-white p-6 rounded-[32px] shadow-md border border-gray-50 animate-fadeIn mb-4">
                        <div class="mb-2"><h3 class="text-lg font-bold text-gray-800 leading-snug">${getValueByKeyword(f, "名稱")}</h3></div>
                        <div class="text-indigo-600 text-xs font-bold mb-1"><i class="fa-solid fa-building mr-1"></i> ${getValueByKeyword(f, "公司")}</div>
                        <div class="text-gray-500 text-[11px] font-medium mb-4 flex items-center"><i class="fa-solid fa-location-dot mr-1 text-rose-400"></i> ${getValueByKeyword(f, "地點")}</div>
                        <div class="text-gray-400 text-[11px] mb-6 leading-relaxed whitespace-pre-line">${getValueByKeyword(f, "說明")}</div>
                        <div class="bg-gray-50 p-4 rounded-2xl mb-5 text-gray-600 text-[11px] font-bold">
                            <i class="fa-solid fa-graduation-cap mr-1 text-indigo-400"></i>
                            ${(getValueByKeyword(f, "科系") || "不限").toString().replace(/\n/g, '<br>')}
                        </div>
                        <button onclick="window.open('${applyLink}', '_blank')" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-sm shadow-lg active:scale-95 transition-all">立即投遞 <i class="fa-solid fa-chevron-right ml-1"></i></button>
                    </div>`;
            }).join('');
        }

        function handleCatSelection(catName, el) {
            document.querySelectorAll('.cat-card').forEach(item => item.classList.remove('active-filter'));
            el.classList.add('active-filter');
            const matchingJobs = allJobs.filter(j => {
                const val = getValueByKeyword(j.fields, "類別");
                return val && val.toString().includes(catName);
            });
            renderJobs(matchingJobs);
            document.getElementById('listTitle').innerText = "推薦職缺";
            document.getElementById('listTitle').scrollIntoView({behavior: 'smooth'});
        }

        function resetFilter() {
            document.querySelectorAll('.cat-card').forEach(item => item.classList.remove('active-filter'));
            renderJobs(allJobs);
            document.getElementById('listTitle').innerText = "推薦職缺";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function handleNavClick(type) {
            const h = document.getElementById('nav-home'), e = document.getElementById('nav-explore');
            if (type === 'home') {
                h.classList.replace('text-gray-400', 'text-indigo-600'); 
                e.classList.replace('text-indigo-600', 'text-gray-400');
                window.scrollTo({top: 0, behavior: 'smooth'});
            } else {
                e.classList.replace('text-gray-400', 'text-indigo-600'); 
                h.classList.replace('text-indigo-600', 'text-gray-400');
                document.getElementById('listTitle').scrollIntoView({behavior: 'smooth'});
            }
        }

        fetchJobs();
    </script>
</body>
</html>
