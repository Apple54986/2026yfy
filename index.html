<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>永豐餘職缺探索 | Student Job</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { background-color: #f8fafc; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .major-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid #f1f5f9; cursor: pointer; }
        .major-card:active { transform: scale(0.92); background-color: #f8fafc; }
        .job-card { border-left: 6px solid #6366f1; transition: transform 0.2s; }
        .job-card:active { transform: translateY(2px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="pb-24">

    <!-- 頂部 Header -->
    <div class="gradient-bg text-white px-8 py-14 rounded-b-[50px] shadow-2xl text-center">
        <h1 class="text-3xl font-extrabold tracking-tight">哈囉🌼</h1>
        <p class="opacity-90 text-sm mt-3 font-medium">在永豐餘找到最適合你的職缺</p>
    </div>

    <!-- 1. 科系選擇區 (方塊) -->
    <section class="px-6 -mt-10">
        <div class="bg-white rounded-[32px] p-6 shadow-xl border border-gray-50">
            <h2 class="text-gray-800 font-bold mb-5 flex items-center text-lg">
                <i class="fa-solid fa-graduation-cap text-indigo-500 mr-2 text-xl"></i> 你的科系是？
            </h2>
            <div id="majorGrid" class="grid grid-cols-2 gap-4">
                <div class="h-20 bg-gray-50 animate-pulse rounded-2xl"></div>
                <div class="h-20 bg-gray-50 animate-pulse rounded-2xl"></div>
            </div>
            <button onclick="resetFilter()" class="w-full mt-5 text-xs text-indigo-500 font-bold py-4 bg-indigo-50 rounded-2xl active:bg-indigo-100 transition-all">
                顯示所有職缺
            </button>
        </div>
    </section>

    <!-- 2. 地點篩選 (橫向標籤) -->
    <section class="mt-8 px-6">
        <h2 class="text-gray-800 font-bold mb-4 flex items-center text-lg">
            <i class="fa-solid fa-location-dot text-rose-500 mr-2 text-xl"></i> 工作地點
        </h2>
        <div id="locationPills" class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
            <!-- 由 JS 動態生成 -->
        </div>
    </section>

    <!-- 3. 職缺清單 -->
    <section class="mt-6 px-6">
        <div class="flex justify-between items-center mb-5">
            <h2 id="listTitle" class="text-gray-900 font-bold text-xl">推薦職缺</h2>
            <span id="jobCount" class="bg-indigo-100 text-indigo-600 text-xs px-3 py-1.5 rounded-full font-extrabold">0</span>
        </div>
        
        <div id="jobList" class="space-y-5">
            <div class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-[4px] border-indigo-500 border-t-transparent"></div>
                <p class="text-gray-400 text-xs mt-4 font-medium">連線至 Google Sheets...</p>
            </div>
        </div>
    </section>

    <!-- 底部導覽 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg border-t border-gray-100 px-12 py-5 flex justify-around items-center z-50 shadow-lg">
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="flex flex-col items-center text-indigo-600">
            <i class="fa-solid fa-house-chimney text-2xl"></i>
            <span class="text-[10px] mt-1.5 font-bold">首頁</span>
        </button>
        <button onclick="document.getElementById('listTitle').scrollIntoView({behavior: 'smooth'})" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-compass text-2xl"></i>
            <span class="text-[10px] mt-1.5 font-bold">探索</span>
        </button>
    </nav>

    <script>
        // --- 設定區 ---
        const SHEET_ID = '1_fe8wTuSfxUX8gMFTz19V5vPX99dj79s8vewQtWjlag';
        const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        let allJobs = [];

        // 1. 抓取資料 (從 Google Sheets)
        async function fetchJobs() {
            try {
                const response = await fetch(SHEET_URL);
                const text = await response.text();
                
                // Google Sheets JSON 回傳格式比較特殊，需要先去除前後的包裝文字
                const jsonData = JSON.parse(text.substring(47, text.length - 2));
                const rows = jsonData.table.rows;
                const cols = jsonData.table.cols;

                // 將 Google Sheets 的格式轉換為類似 Airtable 的 fields 格式
                allJobs = rows.map(row => {
                    let fields = {};
                    row.c.forEach((cell, i) => {
                        const colName = cols[i].label;
                        if (colName) {
                            fields[colName] = cell ? cell.v : "";
                        }
                    });
                    return { fields: fields };
                });
                
                if (allJobs && allJobs.length > 0) {
                    initInterface();
                    renderJobs(allJobs);
                } else {
                    document.getElementById('jobList').innerHTML = `<p class="text-center py-20 text-gray-400">目前沒有職缺資料</p>`;
                }
            } catch (error) {
                console.error("API Error:", error);
                document.getElementById('jobList').innerHTML = `
                    <div class="bg-red-50 p-8 rounded-[32px] text-center border border-red-100">
                        <i class="fa-solid fa-circle-exclamation text-red-500 text-3xl mb-3"></i>
                        <p class="text-red-700 font-bold">連線失敗</p>
                        <p class="text-red-400 text-[10px] mt-2 leading-relaxed">請確認試算表已設為「知道連結的人均可檢視」</p>
                    </div>`;
            }
        }

        // 2. 初始化介面
        function initInterface() {
            let deptSet = new Set();
            let locSet = new Set();

            allJobs.forEach(j => {
                const d = j.fields["科系及其他條件"];
                const l = j.fields["工作地點"];
                
                // Google Sheets 讀進來的是字串，若有多個科系建議用逗號隔開
                if (d) {
                    d.toString().split(/[,，/、\s]+/).forEach(item => {
                        if(item.trim()) deptSet.add(item.trim());
                    });
                }
                if (l) locSet.add(l.toString().trim());
            });

            const uniqueDepts = Array.from(deptSet).slice(0, 8);
            const uniqueLocs = Array.from(locSet);

            const colors = ['bg-blue-50 text-blue-600', 'bg-rose-50 text-rose-600', 'bg-amber-50 text-amber-600', 'bg-emerald-50 text-emerald-600', 'bg-indigo-50 text-indigo-600', 'bg-purple-50 text-purple-600'];
            
            document.getElementById('majorGrid').innerHTML = uniqueDepts.map((d, i) => `
                <div onclick="filterByDept('${d}')" class="major-card ${colors[i % 6]} p-4 rounded-3xl flex items-center justify-center text-center shadow-sm border-0">
                    <span class="text-xs font-bold leading-snug">${d}</span>
                </div>`).join('');

            document.getElementById('locationPills').innerHTML = `
                <button onclick="resetFilter()" class="whitespace-nowrap px-6 py-2.5 rounded-full bg-gray-900 text-white text-xs font-bold">全部</button>` + 
                uniqueLocs.map(l => `
                <button onclick="filterByLoc('${l}')" class="whitespace-nowrap px-6 py-2.5 rounded-full bg-white border border-gray-200 text-gray-600 text-xs font-bold">
                    ${l}
                </button>`).join('');
        }

        // 3. 渲染職缺
        function renderJobs(jobs) {
            document.getElementById('jobCount').innerText = jobs.length;
            const container = document.getElementById('jobList');
            if (jobs.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-gray-400 font-medium">找不到職缺</div>`;
                return;
            }
            container.innerHTML = jobs.map(job => {
                const f = job.fields;
                const loc = f["工作地點"] || '全台';
                const dept = f["科系及其他條件"] || '不限科系';

                return `
                    <div class="job-card bg-white p-6 rounded-[32px] shadow-md border border-gray-50 animate-fadeIn mb-4">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-lg font-bold text-gray-800 leading-snug">${f["職務名稱"] || '職缺'}</h3>
                            <span class="text-[10px] bg-gray-100 text-gray-400 px-2 py-1 rounded-lg font-black">${loc}</span>
                        </div>
                        <div class="text-indigo-600 text-xs font-bold mb-4">
                            <i class="fa-solid fa-building mr-1"></i> ${f["公司別"] || '永豐餘集團'}
                        </div>
                        <div class="text-gray-400 text-[11px] mb-6 line-clamp-2 leading-relaxed">${f["職務說明"] || ''}</div>
                        <div class="bg-gray-50 p-3 rounded-2xl mb-5 text-gray-600 text-[11px] font-bold">
                            <i class="fa-solid fa-graduation-cap mr-1 text-indigo-400"></i> ${dept}
                        </div>
                        <button onclick="window.open('${f["連結"] || 'https://www.yfy.com/'}', '_blank')" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-sm shadow-lg shadow-indigo-100 active:scale-95 transition-all">立即申請 <i class="fa-solid fa-chevron-right ml-1"></i></button>
                    </div>`;
            }).join('');
        }

        function filterByDept(dept) {
            renderJobs(allJobs.filter(j => {
                const val = j.fields["科系及其他條件"];
                return val && val.toString().includes(dept);
            }));
            document.getElementById('listTitle').innerText = `搜尋：${dept}`;
            document.getElementById('listTitle').scrollIntoView({behavior: 'smooth'});
        }

        function filterByLoc(loc) {
            renderJobs(allJobs.filter(j => {
                const val = j.fields["工作地點"];
                return val && val.toString() === loc;
            }));
            document.getElementById('listTitle').innerText = `地點：${loc}`;
        }

        function resetFilter() {
            renderJobs(allJobs);
            document.getElementById('listTitle').innerText = "推薦職缺";
        }

        fetchJobs();
    </script>
</body>
</html>
